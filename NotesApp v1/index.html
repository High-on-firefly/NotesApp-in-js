<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="CSS/app.css">
    </head>
    <body>
        <main id="app">

            <section id="sidebar">
                <header id="sidebar_header">
                    <span id="app_title">Notes</span>
                    <button id="sidebar-close-btn" class="ui-bg-icon"></button>
                </header>

                <div id="sidebar-nav">
                    <button class="ui-btn" id="dashboard-btn">
                        <svg class="ui-icon" aria-hidden="true">
                            <use href="#icon_dashboard"></use>
                        </svg>
                        <span>Dashboard</span>
                    </button>

                    <div class="dropdown">
                        <header class="dropdown-header">
                            <button class="dropdown-toggle" id="my_notebooks">
                                <svg class="ui-icon" aria-hidden="true">
                                    <use href="#icon_notebooks"></use>
                                </svg>
                                <span>My Notebooks</span>
                            </button>
                            <button class="dropdown-add-btn" id="notebook-add-btn">
                                <svg class="ui-icon dropdown-add-icon" aria-hidden="true">
                                    <use href="#icon_add"></use>
                                </svg>
                            </button>
                            <span class="dropdown-chevron dropdown-toggle">
                                <svg class="ui-icon dropdown-chevron-icon">
                                    <use href="#icon_chevron"></use>
                                </svg>
                            </span>
                        </header>
                        <div class="dropdown-list">
                            <div class="dropdown-list-inner">  
                                <button class="dropdown-item">
                                    <svg class="ui-list-icon">
                                        <use href="#icon_book"></use>
                                    </svg>
                                    <span>Book Example</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="dropdown">
                        <header class="dropdown-header">
                            <button class="dropdown-toggle" id="my_notebooks">
                                <svg class="ui-icon" aria-hidden="true">
                                    <use href="#icon_tags"></use>
                                </svg>
                                <span>My Tags</span>
                            </button>
                            <button class="dropdown-add-btn" id="notebook-add-btn">
                                <svg class="ui-icon dropdown-add-icon" aria-hidden="true">
                                    <use href="#icon_add"></use>
                                </svg>
                            </button>
                            <span class="dropdown-chevron dropdown-toggle">
                                <svg class="ui-icon dropdown-chevron-icon">
                                    <use href="#icon_chevron"></use>
                                </svg>
                            </span>
                        </header>
                        <div class="dropdown-list">
                            <div class="dropdown-list-inner">
                                <button class="dropdown-item">
                                    <svg class="ui-list-icon">
                                        <use href="#icon_tag"></use>
                                    </svg>
                                    <span>Tag Example</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <section id="main">
                <button id="sidebar-open-btn">
                    <svg class="ui-icon-big">
                        <use href="#icon_menu"></use>
                    </svg>
                </button>
                <div id="main-content">
                    <div id="note-panel">
                        <header id="note-panel-header">
                            <div id="note-panel-header-inner">
                                <input type="text" id="note-panel-title-input" placeholder="Note Tile here">
                                <button id="note-panel-close-btn">
                                    <svg class="ui-icon">
                                        <use href="#icon_cancel"></use>
                                    </svg>
                                </button>
                            </div>
                            <div id="note-panel-details">
                                <p id="note-panel-date"></p>
                            </div>
                            <div class="switch" id="note-mode-switch">
                                <button class="switch-btn" id="edit-switch-btn">Edit</button>
                                <button class="switch-btn" id="preview-switch-btn">Preview</button>
                            </div>
                        </header>
                        <div id="note-edit-content">Content container</div>
                        <div id="note-read-content">Content container</div>
                    </div>
                    <header id="main-header">All your notes</header>
                    <div id="filter-search">
                        <div class="select">
                            <header class="select-header">
                                <button class="select-toggle">
                                    <span class="select-label">Recents</span>
                                    <span class="select-chevron">
                                        <svg class="ui-icon select-chevron-icon" aria-hidden="true">
                                            <use href="#icon_chevron"></use>
                                        </svg>
                                    </span>
                                </button>
                                <div class="select-list">
                                    <div class="select-list-inner">
                                        <button class="select-item">Recents</button>
                                        <button class="select-item">Newest first</button>
                                        <button class="select-item">Oldest first</button>
                                    </div>
                                </div>
                            </header>
                        </div>
                        <div id="search-bar-container">
                            <div id="search-bar">
                                <svg class="ui-icon-small">
                                    <use href="#icon_search"></use>
                                </svg>
                                <input id="search-input" type="text" placeholder="Search notes">
                            </div>
                            <button id="new-note-btn">
                                <svg class="ui-icon-small">
                                    <use href="#icon_new_note"></use>
                                </svg>
                                <span>New Notes</span>
                            </button>
                        </div>
                    </div>

                    <div id="notes-list">
                        <!-- <div class="note-item">
                            <span class="note-icon">
                                <svg class="ui-icon-small">
                                    <use href="#icon_note"></use>
                                </svg>
                            </span>
                            <div class="note-details">
                                <h3 class="note-title">Note Title Example</h3> 
                                <p class="note-date">01 July 2026 10:41 am</p>
                            </div>
                            <button class="note-delete-btn">
                                <svg class="ui-icon-big">
                                    <use href="#icon_cancel"></use>
                                </svg>
                            </button> -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
